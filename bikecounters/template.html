<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyklo-počítadla Plzeň</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #21262d;
    --green:     #39d353;
    --green-dim: #1a6629;
    --amber:     #e3b341;
    --blue:      #58a6ff;
    --muted:     #6e7681;
    --text:      #e6edf3;
    --text-soft: #8b949e;
    --radius:    12px;
    --max-w:     860px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.12em;
    color: var(--text);
    line-height: 1;
  }
  header h1 span { color: var(--green); }
  header p {
    color: var(--text-soft);
    font-size: 0.85rem;
    margin-top: 0.4rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* ── Stat cards ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
    max-width: var(--max-w);
    margin: 0 auto;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--green-dim); }
  .card-head {
    padding: 1.1rem 1.4rem 0.9rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.7rem;
  }
  .site-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--green-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 1.1rem;
  }
  .card-head-text { flex: 1; min-width: 0; }
  .card-head h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem; letter-spacing: 0.08em; color: var(--text);
  }
  .card-head .dirs {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; color: var(--text-soft); letter-spacing: 0.04em; margin-top: 1px;
  }
  .stats { padding: 0.5rem 0; }
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 0.75rem 1.4rem;
    border-bottom: 1px solid var(--border);
    gap: 0.5rem; align-items: center;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label {
    font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-soft); font-weight: 500;
  }
  .stat-period {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; color: var(--muted); text-align: center;
  }
  .stat-value {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.55rem; letter-spacing: 0.06em; color: var(--green); line-height: 1;
  }
  .breakdown {
    display: flex; gap: 0.4rem;
    grid-column: 1 / -1; padding-bottom: 0.1rem;
  }
  .breakdown-chip {
    display: flex; align-items: center; gap: 0.25rem;
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    color: var(--text-soft); background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px;
  }
  .breakdown-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-bike  { background: var(--green); }
  .dot-scoot { background: var(--blue); }
  .card-foot {
    padding: 0.6rem 1.4rem;
    background: color-mix(in srgb, var(--bg) 40%, transparent);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  }
  .last-updated {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.err { background: var(--amber); }

  /* ── Chart section ── */
  .chart-section {
    max-width: var(--max-w);
    margin: 2rem auto 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .chart-head {
    padding: 1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .chart-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.09em;
    color: var(--text);
  }
  .range-btns {
    display: flex;
    gap: 4px;
  }
  .range-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-soft);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .range-btn:hover {
    border-color: var(--green-dim);
    color: var(--green);
  }
  .range-btn.active {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
    font-weight: 500;
  }
  .chart-legend {
    display: flex;
    gap: 1.2rem;
    padding: 0.75rem 1.4rem 0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-soft);
  }
  .legend-line {
    width: 20px; height: 2px; border-radius: 2px; flex-shrink: 0;
  }
  .chart-body {
    padding: 0.5rem 0.75rem 1rem;
    position: relative;
    height: 280px;
  }

  /* ── Data note ── */
  .data-note {
    text-align: center; margin: 1.5rem auto 0;
    max-width: var(--max-w);
    font-family: 'DM Mono', monospace; font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 1rem;
  }
  .data-note span { color: var(--amber); }

  /* ── Footer ── */
  footer {
    text-align: center; margin-top: 2rem;
    font-family: 'DM Mono', monospace; font-size: 0.68rem;
    color: var(--muted); line-height: 1.8;
  }
  footer a { color: var(--text-soft); text-decoration: none; }
  footer a:hover { color: var(--green); }
</style>
</head>
<body>

<header>
  <h1>PLZEŇ <span>CYKLO</span> POČÍTADLA</h1>
  <p>Provoz kol &amp; koloběžek · 15minutový interval měření</p>
</header>

<div class="grid" id="grid"></div>

<section class="chart-section">
  <div class="chart-head">
    <span class="chart-title">DENNÍ PROVOZ</span>
    <div class="range-btns" id="range-btns">
      <button class="range-btn" data-days="7">7D</button>
      <button class="range-btn" data-days="30">1M</button>
      <button class="range-btn active" data-days="90">3M</button>
      <button class="range-btn" data-days="365">1R</button>
      <button class="range-btn" data-days="0">Vše</button>
    </div>
  </div>
  <div class="chart-legend" id="chart-legend"></div>
  <div class="chart-body">
    <canvas id="traffic-chart"></canvas>
  </div>
</section>

<div class="data-note" id="data-note">
  Data: <span id="data-range">načítání…</span>
</div>

<footer>
  Zdroj: <a href="https://opendata.plzen.eu/public/opendata/dataset/198" target="_blank">opendata.plzen.eu</a>
  &nbsp;·&nbsp; Eco-counter, Plzeňský kraj &nbsp;·&nbsp; Data aktualizována denně ve 4:00
  <br>Celkový provoz = kola (oba směry) + koloběžky (oba směry)
</footer>

<script>
const SITES = [
  { siteId: '300048586', name: 'U Prazdroje',    directions: 'Centrum \u2194 Doubravka', icon: '\uD83C\uDF7A', color: '#39d353', fill: 'rgba(57,211,83,0.08)'  },
  { siteId: '300048587', name: 'Karlovarska',    directions: 'Centrum \u2194 Bolevec',   icon: '\uD83D\uDEB2', color: '#58a6ff', fill: 'rgba(88,166,255,0.08)' },
];

// ── Date helpers ──────────────────────────────────────────────────────────────
function getReferenceDates() {
  const now = new Date();
  const offset = now.getHours() < 4 ? 2 : 1;
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - offset);
  return {
    yStr:     toDateStr(yesterday),
    monthStr: `${now.getFullYear()}-${pad(now.getMonth()+1)}`,
    yearStr:  String(now.getFullYear()),
  };
}
function toDateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function fmt(n) { return n.toLocaleString('cs-CZ'); }
function subDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - n);
  return toDateStr(d);
}

// ── CSV parsing ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].replace(/^\uFEFF/,'').split(';').map(h => h.trim().replace(/^"|"$/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(';');
    if (parts.length < headers.length) continue;
    const row = {};
    headers.forEach((h, j) => { row[h] = parts[j].trim().replace(/^"|"$/g,''); });
    rows.push(row);
  }
  return rows;
}

// ── Aggregation: stat cards ───────────────────────────────────────────────────
function aggregateStats(records) {
  const { yStr, monthStr, yearStr } = getReferenceDates();
  const acc = {
    yDay:  { total:0, bike:0, scoot:0 },
    month: { total:0, bike:0, scoot:0 },
    year:  { total:0, bike:0, scoot:0 },
  };
  let lastTs = '', firstTs = 'z';
  for (const r of records) {
    const ts = (r.timestamp || '').replace(/^"|"$/g,'').trim();
    if (!ts) continue;
    if (ts > lastTs) lastTs = ts;
    if (ts < firstTs) firstTs = ts;
    const d = ts.slice(0,10), m = ts.slice(0,7), y = ts.slice(0,4);
    const bi = +r.bike_count_in||0, bo = +r.bike_count_out||0;
    const si = +r.scooter_count_in||0, so = +r.scooter_count_out||0;
    const bike = bi+bo, scoot = si+so, total = bike+scoot;
    if (d === yStr)     { acc.yDay.total  += total; acc.yDay.bike  += bike; acc.yDay.scoot  += scoot; }
    if (m === monthStr) { acc.month.total += total; acc.month.bike += bike; acc.month.scoot += scoot; }
    if (y === yearStr)  { acc.year.total  += total; acc.year.bike  += bike; acc.year.scoot  += scoot; }
  }
  return { ...acc, lastTs, firstTs: firstTs === 'z' ? '' : firstTs };
}

// ── Aggregation: daily totals for chart ───────────────────────────────────────
function aggregateDaily(records) {
  const daily = new Map();
  for (const r of records) {
    const ts = (r.timestamp || '').replace(/^"|"$/g,'').trim();
    if (!ts) continue;
    const d = ts.slice(0,10);
    const v = (+r.bike_count_in||0) + (+r.bike_count_out||0)
            + (+r.scooter_count_in||0) + (+r.scooter_count_out||0);
    daily.set(d, (daily.get(d) || 0) + v);
  }
  return daily;
}

// ── Stat card UI ──────────────────────────────────────────────────────────────
const PERIODS = [
  { key:'yDay',  label:'Včera' },
  { key:'month', label:'Tento měsíc' },
  { key:'year',  label:'Tento rok' },
];
function periodStr(key) {
  const { yStr, monthStr, yearStr } = getReferenceDates();
  return key==='yDay' ? yStr : key==='month' ? monthStr : yearStr;
}

function buildCard(site) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="site-icon">${site.icon}</div>
      <div class="card-head-text">
        <h2>${site.name}</h2>
        <div class="dirs">${site.directions}</div>
      </div>
    </div>
    <div class="stats">
      ${PERIODS.map(p => `
      <div class="stat-row" id="row-${site.siteId}-${p.key}">
        <div class="stat-label">${p.label}</div>
        <div class="stat-period">${periodStr(p.key)}</div>
        <div class="stat-value" id="val-${site.siteId}-${p.key}">···</div>
      </div>`).join('')}
    </div>
    <div class="card-foot">
      <span class="last-updated" id="upd-${site.siteId}">…</span>
      <span class="status-dot" id="dot-${site.siteId}"></span>
    </div>`;
  return card;
}

function renderCard(site, agg) {
  PERIODS.forEach(p => {
    const valEl = document.getElementById(`val-${site.siteId}-${p.key}`);
    const row   = document.getElementById(`row-${site.siteId}-${p.key}`);
    if (!valEl || !row) return;
    const d = agg[p.key];
    valEl.textContent = fmt(d.total);
    row.querySelector('.breakdown')?.remove();
    const bc = document.createElement('div');
    bc.className = 'breakdown';
    bc.innerHTML = `
      <span class="breakdown-chip"><span class="dot dot-bike"></span>kola ${fmt(d.bike)}</span>
      <span class="breakdown-chip"><span class="dot dot-scoot"></span>koloběžky ${fmt(d.scoot)}</span>`;
    row.appendChild(bc);
  });
  const lastShort = agg.lastTs ? agg.lastTs.slice(0,16) : '—';
  document.getElementById(`upd-${site.siteId}`).textContent = `poslední záznam: ${lastShort}`;
  document.getElementById(`dot-${site.siteId}`).className = 'status-dot ok';
}

// ── Chart ─────────────────────────────────────────────────────────────────────
let chart = null;
let dailyBySite = {};
let allDates    = [];
let activeRange = 90;

function initChart() {
  const ctx = document.getElementById('traffic-chart').getContext('2d');

  const legendEl = document.getElementById('chart-legend');
  SITES.forEach(s => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-line" style="background:${s.color}"></div>${s.name}`;
    legendEl.appendChild(item);
  });

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      animation: { duration: 250, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#8b949e',
          bodyColor: '#e6edf3',
          titleFont: { family: "'DM Mono', monospace", size: 11 },
          bodyFont:  { family: "'DM Mono', monospace", size: 12 },
          padding: 10,
          callbacks: {
            title: items => items[0]?.label ?? '',
            label: item => ` ${item.dataset.label}: ${item.parsed.y.toLocaleString('cs-CZ')}`,
          },
        },
      },
      scales: {
        x: {
          grid:  { color: '#21262d' },
          ticks: {
            color: '#6e7681',
            font:  { family: "'DM Mono', monospace", size: 10 },
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: 10,
          },
          border: { color: '#30363d' },
        },
        y: {
          grid:  { color: '#21262d' },
          ticks: {
            color: '#6e7681',
            font:  { family: "'DM Mono', monospace", size: 10 },
            callback: v => v.toLocaleString('cs-CZ'),
          },
          border: { color: '#30363d' },
          beginAtZero: true,
        },
      },
    },
  });
}

function updateChart(days) {
  if (!chart) return;
  activeRange = days;

  const { yStr } = getReferenceDates();
  const fromDate = days > 0 ? subDays(yStr, days - 1) : (allDates[0] || yStr);
  const filtered = allDates.filter(d => d >= fromDate && d <= yStr);

  // x-axis label format: show year only in "all" view when crossing years
  const spanYears = filtered.length > 0 &&
    filtered[0].slice(0,4) !== filtered[filtered.length-1].slice(0,4);

  const labels = filtered.map(d => {
    const [y, m, day] = d.split('-');
    return spanYears ? `${day}.${m}.${y.slice(2)}` : `${day}.${m}.`;
  });

  const showPoints = filtered.length <= 60;

  const datasets = SITES.map(site => {
    const daily = dailyBySite[site.siteId] || new Map();
    return {
      label: site.name,
      data: filtered.map(d => daily.get(d) || 0),
      borderColor: site.color,
      backgroundColor: site.fill,
      borderWidth: 2,
      pointRadius: showPoints ? 3 : 0,
      pointHoverRadius: 5,
      pointBackgroundColor: site.color,
      tension: 0.35,
      fill: true,
    };
  });

  chart.data.labels   = labels;
  chart.data.datasets = datasets;
  chart.update();
}

function setActiveRange(days) {
  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.classList.toggle('active', +btn.dataset.days === days);
  });
  updateChart(days);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
SITES.forEach(site => grid.appendChild(buildCard(site)));
initChart();

const RAW_CSV = `{{CSV_DATA}}`;

const rows = parseCSV(RAW_CSV);
const bySite = {};
let globalFirst = 'z', globalLast = '';

for (const row of rows) {
  const sid = row.siteId || row.site_id || '';
  if (!bySite[sid]) bySite[sid] = [];
  bySite[sid].push(row);
}

const allDateSet = new Set();

SITES.forEach(site => {
  const siteRows = bySite[site.siteId] || [];
  const agg = aggregateStats(siteRows);
  renderCard(site, agg);
  if (agg.firstTs < globalFirst) globalFirst = agg.firstTs;
  if (agg.lastTs  > globalLast)  globalLast  = agg.lastTs;

  const daily = aggregateDaily(siteRows);
  dailyBySite[site.siteId] = daily;
  daily.forEach((_, d) => allDateSet.add(d));
});

allDates = Array.from(allDateSet).sort();

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => setActiveRange(+btn.dataset.days));
});

setActiveRange(90);

const noteEl = document.getElementById('data-range');
if (noteEl) {
  const f = globalFirst && globalFirst !== 'z' ? globalFirst.slice(0,10) : '?';
  const l = globalLast ? globalLast.slice(0,10) : '?';
  noteEl.innerHTML = `<span>Soubor obsahuje záznamy od ${f} do ${l}</span> — pro novější data stáhněte aktuální XLSX`;
}
</script>
</body>
</html>
